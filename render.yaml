services:
  - type: web
    name: cafe-recs-backend
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm ci --omit=dev --omit=optional
    startCommand: npm run seed && node server.js
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cafe-recs-db
          property: connectionString
      - key: DB_SSL
        value: "true"
      - key: JWT_SECRET
        sync: false
databases:
  - name: cafe-recs-db
    plan: basic-256mb
    region: oregon
