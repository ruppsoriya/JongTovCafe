name: Deploy Backend to Render

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          if [ -z "${RENDER_API_KEY}" ]; then
            echo "::error::Missing GitHub secret RENDER_API_KEY"
            exit 1
          fi

          if [ -z "${RENDER_SERVICE_ID}" ]; then
            echo "::error::Missing GitHub secret RENDER_SERVICE_ID"
            exit 1
          fi

          if [[ ! "${RENDER_SERVICE_ID}" =~ ^srv- ]]; then
            echo "::warning::RENDER_SERVICE_ID usually starts with 'srv-' (current value: ${RENDER_SERVICE_ID})"
          fi

          echo "Triggering deploy for Render service $RENDER_SERVICE_ID"
          response_file="$(mktemp)"
          http_status="$(curl -sS -o "${response_file}" -w "%{http_code}" -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": true}')"

          echo "Render API HTTP status: ${http_status}"
          cat "${response_file}"
          rm -f "${response_file}"

          if [[ "${http_status}" != 2* ]]; then
            exit 1
          fi
